name: Publish to Stores

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish to stores'
        required: true
      chrome:
        description: 'Publish to Chrome Web Store'
        type: boolean
        default: true
      firefox:
        description: 'Publish to Firefox Add-Ons'
        type: boolean
        default: true
      edge:
        description: 'Publish to Edge Add-ons'
        type: boolean
        default: true
      upload-only:
        description: 'Upload only'
        type: boolean
        default: false

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    with:
      ref: ${{ inputs.tag }}

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm zip && pnpm zip:firefox

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zips
          path: .output/*.zip
          if-no-files-found: error
          include-hidden-files: true

  submit:
    name: Submit to Stores
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zips
          path: .output/

      - name: Resolve zip paths
        id: zips
        run: |
          echo "chrome=$(ls .output/*-chrome.zip)" >> $GITHUB_OUTPUT
          echo "firefox=$(ls .output/*-firefox.zip)" >> $GITHUB_OUTPUT

      - uses: creeperkatze/extension-publish@v1
        with:
          chrome-client-id:     ${{ inputs.chrome && secrets.CHROME_CLIENT_ID || '' }}
          chrome-client-secret: ${{ inputs.chrome && secrets.CHROME_CLIENT_SECRET || '' }}
          chrome-refresh-token: ${{ inputs.chrome && secrets.CHROME_REFRESH_TOKEN || '' }}
          chrome-publisher-id:  ${{ inputs.chrome && secrets.CHROME_PUBLISHER_ID || '' }}
          chrome-extension-id:  ${{ inputs.chrome && secrets.CHROME_EXTENSION_ID || '' }}
          chrome-zip-path:      ${{ inputs.chrome && steps.zips.outputs.chrome || '' }}
          chrome-publish:       ${{ inputs.upload-only && 'false' || 'true' }}

          firefox-api-key:      ${{ inputs.firefox && secrets.FIREFOX_JWT_ISSUER || '' }}
          firefox-api-secret:   ${{ inputs.firefox && secrets.FIREFOX_JWT_SECRET || '' }}
          firefox-extension-id: ${{ inputs.firefox && 'pihole-in-one@creeperkatze.dev' || '' }}
          firefox-xpi-path:     ${{ inputs.firefox && steps.zips.outputs.firefox || '' }}
          firefox-license:      AGPL-3.0-only
          firefox-compatibility-firefox: true
          firefox-compatibility-android: true

          edge-api-key:         ${{ inputs.edge && secrets.EDGE_API_KEY || '' }}
          edge-client-id:       ${{ inputs.edge && secrets.EDGE_CLIENT_ID || '' }}
          edge-product-id:      ${{ inputs.edge && secrets.EDGE_PRODUCT_ID || '' }}
          edge-zip-path:        ${{ inputs.edge && steps.zips.outputs.chrome || '' }}
          edge-publish:         ${{ inputs.upload-only && 'false' || 'true' }}
