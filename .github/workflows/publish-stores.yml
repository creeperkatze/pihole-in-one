name: Publish to Stores

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish to stores'
        required: true
      chrome:
        description: 'Publish to Chrome Web Store'
        type: boolean
        default: true
      firefox:
        description: 'Publish to Firefox Add-Ons'
        type: boolean
        default: true
      edge:
        description: 'Publish to Edge Add-ons'
        type: boolean
        default: true
      upload-only:
        description: 'Upload only'
        type: boolean
        default: false

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    with:
      ref: ${{ inputs.tag }}

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm zip && pnpm zip:firefox

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zips
          path: .output/*.zip
          if-no-files-found: error
          include-hidden-files: true

  submit:
    name: Submit to Stores
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zips
          path: .output/

      - name: Submit to stores
        run: |
          ARGS=()
          [[ "${{ inputs.chrome }}" == "true" ]] && ARGS+=(--chrome-zip .output/*-chrome.zip)
          [[ "${{ inputs.firefox }}" == "true" ]] && ARGS+=(--firefox-zip .output/*-firefox.zip --firefox-sources-zip .output/*-sources.zip)
          [[ "${{ inputs.edge }}" == "true" ]] && ARGS+=(--edge-zip .output/*-chrome.zip)
          pnpm wxt submit "${ARGS[@]}"
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_SKIP_SUBMIT_REVIEW: ${{ inputs.upload-only }}
          FIREFOX_EXTENSION_ID: pihole-in-one@creeperkatze.dev
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_SKIP_SUBMIT_REVIEW: ${{ inputs.upload-only }}
